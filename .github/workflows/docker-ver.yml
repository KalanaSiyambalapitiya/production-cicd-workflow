name: Deploy - Docker Image

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Get Git tag version
      - name: Extract Git tag
        id: vars
        run: |
          echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      # 3. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cicd-app:${{ env.TAG }} .

      # 5. Tag latest image
      - name: Tag latest image
        run: |
          docker tag \
            ${{ secrets.DOCKER_USERNAME }}/cicd-app:${{ env.TAG }} \
            ${{ secrets.DOCKER_USERNAME }}/cicd-app:latest

      # 6. Push version tag
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-app:${{ env.TAG }}

      # 7. Push latest tag
      - name: Push latest image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-app:latest